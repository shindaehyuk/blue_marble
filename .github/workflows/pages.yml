name: Deploy GitHub Pages

# 개발 브랜치에 푸시하면 gh-pages 브랜치로 미러링 → GitHub Pages가 자동 배포
on:
  push:
    branches: [claude/burumabl-board-game-qic0qa]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Mirror to gh-pages
        run: git push origin HEAD:gh-pages --force
