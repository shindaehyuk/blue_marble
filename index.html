<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>부름마블 | 연합교제</title>
<style>
  /* ============================================================
     🎨 디자인 토큰 — 부름마블 네이비 + 골드 테마
     ============================================================ */
  :root{
    --navy-0:#0b1526;        /* 페이지 배경 */
    --navy-1:#0f1e36;        /* 보드 배경 */
    --navy-2:#152845;        /* 칸/패널 */
    --navy-3:#1c3357;        /* 밝은 패널 */
    --navy-line:rgba(230,192,92,.4);

    --gold:#e6c05c;
    --gold-light:#f6dfa0;
    --gold-deep:#a97a1e;

    --text:#eef4fc;
    --muted:#9fb0c8;

    /* 4팀 컬러 */
    --teamA:#4d96ff;  /* 🐶 강아지팀 */
    --teamB:#ff6b9d;  /* 🐱 고양이팀 */
    --teamC:#3ecf7a;  /* 🐰 토끼팀  */
    --teamD:#f7a03c;  /* 🦊 여우팀  */

    --font:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',system-ui,-apple-system,sans-serif;
    --mono:'JetBrains Mono','SFMono-Regular',Consolas,monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;}
  body{
    min-height:100vh;
    background:var(--navy-0);
    background-image:
      repeating-linear-gradient(45deg,  rgba(255,255,255,.035) 0 1px, transparent 1px 30px),
      repeating-linear-gradient(-45deg, rgba(255,255,255,.035) 0 1px, transparent 1px 30px);
    font-family:var(--font);
    color:var(--text);
  }
  button{font-family:var(--font);}

  /* ============================================================
     🏁 인트로 (게임 시작 전 페이지)
     ============================================================ */
  #intro{
    position:fixed; inset:0; z-index:100;
    background:var(--navy-0);
    background-image:
      repeating-linear-gradient(45deg,  rgba(255,255,255,.035) 0 1px, transparent 1px 30px),
      repeating-linear-gradient(-45deg, rgba(255,255,255,.035) 0 1px, transparent 1px 30px);
    color:var(--text);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    overflow:hidden;
    transition:opacity .6s ease, visibility 0s linear .6s;
  }
  #intro.gone{ opacity:0; visibility:hidden; pointer-events:none; }

  .aurora{
    position:absolute; inset:-25%; z-index:0; pointer-events:none;
    background:conic-gradient(from 180deg at 50% 42%,
      rgba(230,192,92,.10), rgba(60,110,200,.14), rgba(30,140,140,.08),
      rgba(90,140,255,.10), rgba(230,192,92,.10));
    filter:blur(70px);
    animation:auroraSpin 46s linear infinite;
  }
  @keyframes auroraSpin{ to{ transform:rotate(360deg); } }
  .stars{ position:absolute; inset:0; z-index:0; pointer-events:none; }
  .stars i{ position:absolute; border-radius:50%; background:#eaf2ff; animation:twinkle ease-in-out infinite; }
  @keyframes twinkle{ 0%,100%{opacity:.1; transform:scale(.7);} 50%{opacity:.9; transform:scale(1);} }
  .vignette{ position:absolute; inset:0; z-index:0; pointer-events:none;
    box-shadow:inset 0 0 180px 60px rgba(2,6,14,.8); }

  .intro-inner{ position:relative; z-index:1; text-align:center; padding:24px; max-width:760px; }
  .intro-eyebrow{
    display:inline-flex; align-items:center; gap:8px;
    font-family:var(--mono); font-size:12px; letter-spacing:.18em;
    color:var(--gold-light);
    background:rgba(230,192,92,.08);
    border:1px solid rgba(230,192,92,.35);
    padding:6px 14px; border-radius:999px; margin-bottom:20px;
  }
  .intro-eyebrow .dot{ width:6px; height:6px; border-radius:50%; background:var(--gold);
    box-shadow:0 0 8px var(--gold); animation:pulse 1.6s ease-in-out infinite; }
  @keyframes pulse{ 0%,100%{opacity:1;transform:scale(1);} 50%{opacity:.4;transform:scale(.7);} }

  .intro-logo{
    display:block; margin:0 auto;
    width:min(78vw, 430px);
    filter:drop-shadow(0 14px 44px rgba(230,192,92,.25));
    animation:logoFloat 4s ease-in-out infinite;
  }
  @keyframes logoFloat{ 0%,100%{transform:translateY(0);} 50%{transform:translateY(-8px);} }
  .intro-slogan{
    display:inline-block; margin:20px 0 4px;
    font-size:clamp(16px,2.4vw,21px); font-weight:800; color:#1b2b12;
    color:#2b1f04;
    background:linear-gradient(180deg, var(--gold-light), var(--gold));
    padding:8px 26px; border-radius:999px;
    box-shadow:0 6px 24px rgba(230,192,92,.3), inset 0 1px 0 rgba(255,255,255,.6);
  }
  .intro-sub{ color:var(--muted); font-size:14px; margin:14px 0 0; line-height:1.7; }

  .intro-teams{ display:flex; justify-content:center; gap:14px; margin:30px 0 6px; flex-wrap:wrap; }
  .intro-team{
    display:flex; flex-direction:column; align-items:center; gap:8px;
    background:var(--navy-2); border:1px solid rgba(255,255,255,.08); border-radius:16px;
    padding:16px 20px 12px; min-width:104px;
    transition:transform .25s ease, border-color .25s ease, box-shadow .25s ease;
  }
  .intro-team:hover{ transform:translateY(-5px); border-color:var(--tc);
    box-shadow:0 10px 30px rgba(0,0,0,.5), 0 0 18px color-mix(in srgb, var(--tc) 35%, transparent); }
  .intro-team .face{
    width:54px; height:54px; border-radius:50%;
    display:flex; align-items:center; justify-content:center; font-size:30px;
    background:color-mix(in srgb, var(--tc) 22%, transparent);
    border:2.5px solid var(--tc);
    animation:bob 3s ease-in-out infinite;
  }
  .intro-team:nth-child(2) .face{ animation-delay:.4s; }
  .intro-team:nth-child(3) .face{ animation-delay:.8s; }
  .intro-team:nth-child(4) .face{ animation-delay:1.2s; }
  @keyframes bob{ 0%,100%{transform:translateY(0);} 50%{transform:translateY(-6px);} }
  .intro-team b{ font-size:13.5px; color:var(--text); }
  .intro-team span{ font-family:var(--mono); font-size:10px; color:var(--muted); letter-spacing:.12em; }

  .start-wrap{ position:relative; margin-top:26px; display:inline-block; }
  .start-wrap::before{
    content:""; position:absolute; inset:-12px -22px; border-radius:999px;
    background:radial-gradient(closest-side, rgba(230,192,92,.28), transparent);
    animation:btnAura 2.6s ease-in-out infinite; pointer-events:none;
  }
  @keyframes btnAura{ 0%,100%{opacity:.5; transform:scale(.96);} 50%{opacity:1; transform:scale(1.05);} }
  .start-btn{
    position:relative; display:inline-flex; align-items:center; gap:10px;
    height:58px; padding:0 44px;
    font-size:18px; font-weight:700; letter-spacing:-.01em; color:#2b1f04;
    background:linear-gradient(180deg, var(--gold-light), var(--gold) 70%);
    border:1px solid rgba(255,255,255,.3); border-radius:14px; cursor:pointer; overflow:hidden;
    box-shadow:0 1px 2px rgba(0,0,0,.4), 0 10px 34px rgba(230,192,92,.3), inset 0 1px 0 rgba(255,255,255,.5);
    transition:transform .2s cubic-bezier(.3,1.3,.5,1), box-shadow .2s ease, filter .2s ease;
  }
  .start-btn:hover{ filter:brightness(1.05); transform:translateY(-2px);
    box-shadow:0 1px 2px rgba(0,0,0,.4), 0 16px 44px rgba(230,192,92,.45), inset 0 1px 0 rgba(255,255,255,.6); }
  .start-btn:active{ transform:translateY(-1px) scale(.97); }
  .intro-foot{ position:absolute; bottom:20px; left:0; right:0; text-align:center;
    font-size:11px; color:var(--muted); opacity:.6; z-index:1; }

  /* ============================================================
     🗺️ 게임 화면 / 보드
     ============================================================ */
  #game{ display:none; min-height:100vh; padding:14px; }
  #game.on{ display:flex; align-items:center; justify-content:center; }

  .board-wrap{ width:min(96vmin, 1040px); }
  #board{
    position:relative;
    width:100%; aspect-ratio:1;
    display:grid;
    grid-template-columns:1.32fr repeat(5,1fr) 1.32fr;
    grid-template-rows:1.32fr repeat(5,1fr) 1.32fr;
    gap:4px;
    background:var(--navy-1);
    border:3px solid var(--gold);
    border-radius:18px;
    padding:6px;
    box-shadow:0 24px 70px rgba(2,8,20,.7), 0 0 44px rgba(230,192,92,.12),
      inset 0 0 0 1px rgba(255,255,255,.06);
  }

  /* ------- 칸 ------- */
  .tile{
    position:relative;
    background:var(--navy-2);
    border:2px solid rgba(255,255,255,.14);
    border-radius:10px;
    overflow:hidden;
    cursor:pointer;
    display:flex; flex-direction:column;
    transition:transform .15s ease, box-shadow .15s ease, filter .15s ease;
  }
  .tile:hover{ transform:translateY(-2px); filter:brightness(1.12);
    box-shadow:0 8px 20px rgba(0,0,0,.5); z-index:5; }
  .tile .timg{
    flex:1; min-height:0;
    background-size:cover; background-position:center;
  }
  .tile .tname{
    flex-shrink:0;
    font-size:clamp(9px,1.25vmin,13px); font-weight:700; color:var(--text);
    text-align:center; padding:3px 2px 4px;
    background:linear-gradient(180deg, var(--navy-3), var(--navy-2));
    border-top:1px solid rgba(255,255,255,.1);
    letter-spacing:-.02em; line-height:1.15;
    word-break:keep-all;
  }
  /* 팀 구역 (일꾼을 세울 수 있는 16칸): 팀 색깔 테두리 */
  .tile.dept{ border-color:var(--tc); }
  .tile.dept .tname{ box-shadow:inset 0 2px 0 color-mix(in srgb, var(--tc) 55%, transparent); }
  /* 특수 칸: 골드 테두리 */
  .tile.corner{ border-color:var(--gold); }
  .tile.corner .tname{ font-size:clamp(10px,1.5vmin,15px); padding:4px 2px 5px; }
  .tile.gold, .tile.prize{ border-color:var(--gold); }
  .tile.gold .tname, .tile.prize .tname{
    background:linear-gradient(180deg,#f6dfa0,#e6c05c); color:#2b1f04;
  }
  .tile.start .tname{ background:linear-gradient(180deg,#f6dfa0,#e6c05c); color:#2b1f04; }

  .tile .badge{
    position:absolute; top:4px; left:4px; z-index:2;
    font-size:clamp(8px,1.1vmin,11px); font-weight:800;
    background:var(--gold); color:#2b1f04;
    padding:2px 7px; border-radius:999px;
    box-shadow:0 2px 6px rgba(0,0,0,.4);
  }
  /* 통행료 ×2 표시 (팀 구역에 홈팀 일꾼이 있을 때) */
  .x2badge{
    position:absolute; right:3px; bottom:24px; z-index:3;
    font-size:clamp(9px,1.2vmin,12px); font-weight:900;
    background:linear-gradient(180deg,#ffd86b,#e0a62f); color:#2b1f04;
    padding:1px 7px; border-radius:999px;
    box-shadow:0 2px 8px rgba(0,0,0,.5), 0 0 10px rgba(255,216,107,.5);
    display:none;
    animation:x2pop .4s cubic-bezier(.3,1.6,.5,1);
  }
  .x2badge.on{ display:block; }
  @keyframes x2pop{ from{ transform:scale(0);} to{ transform:scale(1);} }

  /* ------- 일꾼 세우기 버튼 (부서 칸에만) ------- */
  .wbtn{
    position:absolute; top:3px; right:3px; z-index:3;
    width:20px; height:20px; border-radius:7px;
    border:1.5px solid var(--gold);
    background:rgba(15,30,54,.92); color:var(--gold-light);
    font-size:13px; font-weight:800; line-height:1;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; padding:0;
    box-shadow:0 2px 6px rgba(0,0,0,.45);
    transition:transform .15s ease, background .15s ease, color .15s ease;
  }
  .wbtn:hover{ transform:scale(1.18); background:var(--gold); color:#2b1f04; }
  .wbtn::before{ content:"+"; margin-top:-1px; }

  /* ------- 일꾼 말뚝 ------- */
  .workers{
    position:absolute; left:3px; right:24px; top:3px; z-index:2;
    display:flex; flex-wrap:wrap; gap:2px; justify-content:flex-start;
    pointer-events:none;
  }
  .worker{
    width:clamp(12px,1.7vmin,17px); height:clamp(12px,1.7vmin,17px);
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:clamp(7px,1.05vmin,10px);
    background:var(--wc); border:1.5px solid #fff;
    box-shadow:0 1px 4px rgba(0,0,0,.5);
  }

  /* ------- 보드 중앙 ------- */
  .center{
    grid-area:2/2/7/7;
    position:relative;
    border-radius:14px;
    overflow:hidden;
    border:2px solid var(--gold);
    background:var(--navy-1);
    background-image:
      repeating-linear-gradient(45deg,  rgba(255,255,255,.04) 0 1px, transparent 1px 26px),
      repeating-linear-gradient(-45deg, rgba(255,255,255,.04) 0 1px, transparent 1px 26px);
    box-shadow:inset 0 0 60px rgba(2,8,20,.6), 0 10px 30px rgba(2,8,20,.5);
    display:flex; align-items:center; justify-content:center;
  }
  .center .clogo{
    width:74%; max-height:70%;
    object-fit:contain;
    margin-bottom:8%;
    filter:drop-shadow(0 12px 34px rgba(230,192,92,.22));
    pointer-events:none;
  }
  .center .cbar{
    position:absolute; left:0; right:0; bottom:0;
    display:flex; justify-content:center; gap:10px; flex-wrap:wrap;
    padding:12px 10px 14px;
    background:linear-gradient(180deg, transparent, rgba(4,10,22,.75) 45%);
  }
  .cbtn{
    display:inline-flex; align-items:center; gap:7px;
    height:42px; padding:0 20px;
    font-size:14.5px; font-weight:700; color:#2b1f04;
    background:linear-gradient(180deg, var(--gold-light), var(--gold) 75%);
    border:1px solid rgba(255,255,255,.4); border-radius:11px; cursor:pointer;
    box-shadow:0 3px 10px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.55);
    transition:transform .18s cubic-bezier(.3,1.3,.5,1), filter .18s ease;
  }
  .cbtn:hover{ transform:translateY(-2px); filter:brightness(1.06); }
  .cbtn:active{ transform:scale(.96); }
  .cbtn.sub{
    background:rgba(15,30,54,.9); color:var(--gold-light);
    border:1.5px solid var(--navy-line);
  }
  .center .legend{
    position:absolute; top:8px; left:50%; transform:translateX(-50%);
    display:flex; gap:6px;
    background:rgba(15,30,54,.85); border:1.5px solid var(--navy-line);
    border-radius:999px; padding:4px 10px;
    backdrop-filter:blur(3px);
  }
  .legend .lg{ display:flex; align-items:center; gap:3px; font-size:11.5px; font-weight:700; color:var(--text); }
  .legend .lg i{ width:10px; height:10px; border-radius:50%; background:var(--tc); display:inline-block; border:1.5px solid #fff; box-shadow:0 1px 2px rgba(0,0,0,.3); }

  /* ------- 게임 말 (동물 캐릭터) ------- */
  #pieceLayer{ position:absolute; inset:0; z-index:20; pointer-events:none; }
  .piece{
    position:absolute; width:4.6%; aspect-ratio:1; min-width:30px;
    border-radius:50%;
    background:radial-gradient(circle at 32% 28%, #fffdf5, #efe2c2 72%);
    border:2.5px solid var(--tc);
    box-shadow:0 4px 12px rgba(0,0,0,.55), 0 0 0 2px rgba(255,255,255,.4) inset;
    display:flex; align-items:center; justify-content:center;
    font-size:clamp(15px,2.4vmin,24px);
    cursor:grab; pointer-events:auto; touch-action:none;
    user-select:none;
    transform:translate(-50%,-50%);
    transition:box-shadow .15s ease;
  }
  .piece:active{ cursor:grabbing; }
  .piece.drag{
    z-index:30;
    box-shadow:0 12px 26px rgba(0,0,0,.6), 0 0 16px color-mix(in srgb, var(--tc) 60%, transparent);
  }
  .piece::after{
    content:attr(data-label);
    position:absolute; top:calc(100% + 1px); left:50%; transform:translateX(-50%);
    font-size:9px; font-weight:800; color:#fff; letter-spacing:-.02em;
    background:var(--tc); border-radius:999px; padding:1px 6px;
    white-space:nowrap; box-shadow:0 1px 4px rgba(0,0,0,.4);
    opacity:.95; pointer-events:none;
  }

  /* ============================================================
     🪟 모달 공통
     ============================================================ */
  .modal{
    position:fixed; inset:0; z-index:200;
    display:flex; align-items:center; justify-content:center; padding:20px;
    opacity:0; pointer-events:none; transition:opacity .25s ease;
  }
  .modal.open{ opacity:1; pointer-events:auto; }
  .modal .mback{ position:absolute; inset:0; background:rgba(3,8,18,.7); backdrop-filter:blur(4px); }
  .mcard{
    position:relative; z-index:1;
    width:min(92vw, 440px);
    background:linear-gradient(165deg, var(--navy-2), var(--navy-1));
    border:2px solid var(--navy-line);
    border-radius:20px;
    box-shadow:0 30px 80px rgba(0,0,0,.7), 0 0 50px rgba(230,192,92,.1);
    overflow:hidden;
    transform:translateY(14px) scale(.97);
    transition:transform .25s cubic-bezier(.3,1.2,.4,1);
    max-height:90vh; overflow-y:auto;
    color:var(--text);
  }
  .modal.open .mcard{ transform:none; }
  /* 칸 정보 모달은 조금 크게 */
  .mcard.big{ width:min(94vw, 560px); }
  .mclose{
    position:absolute; top:10px; right:10px; z-index:5;
    width:32px; height:32px; border-radius:50%;
    border:1.5px solid var(--navy-line); background:rgba(15,30,54,.9);
    font-size:15px; font-weight:800; color:var(--gold-light); cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    transition:transform .15s ease;
  }
  .mclose:hover{ transform:rotate(90deg) scale(1.08); }

  /* ------- 칸 정보 모달 ------- */
  .tm-hero{ position:relative; height:200px; background-size:cover; background-position:center; }
  .tm-hero::after{ content:""; position:absolute; inset:0;
    background:linear-gradient(180deg, transparent 30%, rgba(6,14,28,.85)); }
  .tm-hero .tm-title{
    position:absolute; left:20px; bottom:14px; z-index:1;
    color:#fff; font-size:30px; font-weight:800; letter-spacing:-.02em;
    text-shadow:0 2px 12px rgba(0,0,0,.7); margin:0;
  }
  .tm-hero .tm-type{
    position:absolute; left:20px; top:14px; z-index:1;
    font-size:12px; font-weight:800; letter-spacing:.06em;
    background:var(--gold); color:#2b1f04;
    padding:4px 12px; border-radius:999px;
    box-shadow:0 2px 8px rgba(0,0,0,.4);
  }
  .tm-body{ padding:18px 20px 20px; }
  .tm-desc{ font-size:15.5px; line-height:1.65; color:var(--text); margin:0 0 4px; word-break:keep-all; }
  .tm-sec{
    margin-top:12px;
    background:rgba(8,17,33,.6); border:1.5px dashed var(--navy-line); border-radius:12px;
    padding:12px 14px;
  }
  .tm-sec h4{
    margin:0 0 6px; font-size:12.5px; letter-spacing:.06em; color:var(--gold-light);
    display:flex; align-items:center; gap:5px;
  }
  .tm-sec p{ margin:0; font-size:14.5px; line-height:1.6; color:var(--text); word-break:keep-all; }
  .tm-sec.zone{ border-style:solid; border-color:color-mix(in srgb, var(--tc) 60%, transparent); }
  .tm-sec.zone h4{ color:var(--tc); }
  .tm-sec .x2on{
    display:inline-block; margin-top:6px;
    font-size:12.5px; font-weight:900; color:#2b1f04;
    background:linear-gradient(180deg,#ffd86b,#e0a62f);
    padding:2px 10px; border-radius:999px;
    box-shadow:0 0 12px rgba(255,216,107,.4);
  }
  .tm-workers{ margin-top:12px; display:flex; gap:6px; flex-wrap:wrap; }
  .tm-workers .wk{
    display:inline-flex; align-items:center; gap:5px;
    font-size:13px; font-weight:700; color:var(--text);
    background:rgba(8,17,33,.6); border:1.5px solid rgba(255,255,255,.14); border-radius:999px;
    padding:3px 11px 3px 5px;
  }
  .tm-workers .wk i{ width:17px; height:17px; border-radius:50%; background:var(--tc);
    display:inline-flex; align-items:center; justify-content:center; font-size:9px; font-style:normal;
    border:1.5px solid #fff; box-shadow:0 1px 3px rgba(0,0,0,.4); }
  .tm-actions{ display:flex; gap:9px; margin-top:16px; }
  .tm-actions:empty{ display:none; }
  .mbtn{
    flex:1; height:46px; border-radius:11px; cursor:pointer;
    font-size:15px; font-weight:700;
    border:1px solid rgba(255,255,255,.35);
    background:linear-gradient(180deg, var(--gold-light), var(--gold) 75%);
    color:#2b1f04;
    box-shadow:0 3px 10px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.55);
    transition:transform .18s cubic-bezier(.3,1.3,.5,1), filter .18s ease;
  }
  .mbtn:hover{ transform:translateY(-2px); filter:brightness(1.05); }
  .mbtn:active{ transform:scale(.97); }
  .mbtn.ghost{ background:rgba(15,30,54,.9); border:1.5px solid var(--navy-line); color:var(--gold-light); }

  /* ------- 일꾼 팀 선택 모달 ------- */
  .wm-head{ padding:20px 20px 4px; text-align:center; }
  .wm-head h3{ margin:0; font-size:20px; font-weight:800; color:var(--text); }

const WORKER_KEY = "bm_workers_v1", PIECE_KEY = "bm_pieces_v1", STARTED_KEY = "bm_started_v1";

const $ = id => document.getElementById(id);
function teamOf(id){ return TEAMS.find(t=>t.id===id); }

/* ---------- 상태 (브라우저에 자동 저장) ---------- */
let workers = {};   // { tileIndex: ["A","B",...] }
let pieces  = {};   // { teamId: {x,y} (% 좌표) }

function loadState(){
  try{ const w = JSON.parse(localStorage.getItem(WORKER_KEY)); if(w && typeof w==="object") workers = w; }catch(e){}
  try{ const p = JSON.parse(localStorage.getItem(PIECE_KEY));  if(p && typeof p==="object") pieces  = p; }catch(e){}
  /* 일꾼을 세울 수 없는 칸에 저장돼 있던 일꾼은 정리 */
  Object.keys(workers).forEach(k=>{
    if(!TILES[k] || TILES[k].kind!=="dept") delete workers[k];
  });
}
function saveState(){
  try{
    localStorage.setItem(WORKER_KEY, JSON.stringify(workers));
    localStorage.setItem(PIECE_KEY,  JSON.stringify(pieces));
  }catch(e){}
}

    s.style.width=size+"px"; s.style.height=size+"px";

    s.style.animationDelay=(-Math.random()*6)+"s";
    box.appendChild(s);
  }
})();

})();

  requestAnimationFrame(renderPieces);
}
$("startBtn").addEventListener("click", startGame);
/* 황금열쇠 페이지에서 돌아오면 인트로 건너뛰기 */
if(sessionStorage.getItem(STARTED_KEY)==="1"){
  $("intro").style.transition="none";
  startGame();
}

/* ---------- 보드 그리기 ---------- */
/* 시계 방향 경로 → 7×7 그리드 좌표 (row, col) */
function gridPos(i){
  if(i===0)  return [7,1];            // 본당 로비 (왼쪽 아래)
  if(i<6)    return [7-i,1];          // 왼쪽 변 ↑
  if(i===6)  return [1,1];            // 사망의 골짜기 (왼쪽 위)
  if(i<12)   return [1,i-5];          // 위쪽 변 →
  if(i===12) return [1,7];            // 총무부 (오른쪽 위)
  if(i<18)   return [i-11,7];         // 오른쪽 변 ↓
  if(i===18) return [7,7];            // 바자회 (오른쪽 아래)
  return [7, 7-(i-18)];               // 아래쪽 변 ←
}

const boardEl = $("board");
const tileEls = [];
(function buildBoard(){
  TILES.forEach((t, i)=>{
    const [r,c] = gridPos(i);
    const isDept = t.kind==="dept";
    const el = document.createElement("div");
    el.className = "tile " + t.kind + ((t.kind!=="dept" && t.kind!=="gold" && t.kind!=="prize") ? " corner" : "");
    el.style.gridArea = `${r}/${c}`;
    if(isDept) el.style.setProperty("--tc", teamOf(t.home).color);
    el.innerHTML = `
      ${t.kind==="start" ? '<span class="badge">▶ 출발</span>' : ""}
      ${isDept ? `<button class="wbtn" title="일꾼 세우기" aria-label="${t.name}에 일꾼 세우기"></button>` : ""}
      <div class="timg" style="background-image:url('${t.img}')"></div>
      <div class="tname">${t.name}</div>
      <div class="workers"></div>
      ${isDept ? '<span class="x2badge">×2</span>' : ""}`;
    el.addEventListener("click", ()=>openTileModal(i));
    const wb = el.querySelector(".wbtn");
    if(wb) wb.addEventListener("click", e=>{ e.stopPropagation(); openWorkerModal(i); });
    boardEl.insertBefore(el, boardEl.querySelector(".center"));
    tileEls.push(el);
  });
})();

function renderWorkers(i){
  const t = TILES[i];
  const box = tileEls[i].querySelector(".workers");
  const list = workers[i] || [];
  box.innerHTML = list.map(id=>{
    const tm = teamOf(id);
    return `<span class="worker" style="--wc:${tm.color}" title="${tm.name} 일꾼">${tm.emoji}</span>`;
  }).join("");
  /* 홈팀 일꾼이 세워졌으면 통행료 ×2 표시 */
  const x2 = tileEls[i].querySelector(".x2badge");
  if(x2) x2.classList.toggle("on", t.kind==="dept" && list.includes(t.home));
}
function renderAllWorkers(){ TILES.forEach((_,i)=>renderWorkers(i)); }

/* ---------- 팀 범례 ---------- */
(function makeLegend(){
  $("legend").innerHTML = TEAMS.map(t=>
    `<span class="lg" style="--tc:${t.color}"><i></i>${t.emoji}</span>`).join("");
})();

/* ---------- 모달 공통 ---------- */
function openModal(id){ const m=$(id); m.classList.add("open"); m.setAttribute("aria-hidden","false"); }
function closeModal(id){ const m=$(id); m.classList.remove("open"); m.setAttribute("aria-hidden","true"); }
document.querySelectorAll(".modal").forEach(m=>{
  m.querySelectorAll("[data-close]").forEach(b=>b.addEventListener("click", ()=>closeModal(m.id)));
});
document.addEventListener("keydown", e=>{
  if(e.key==="Escape") document.querySelectorAll(".modal.open").forEach(m=>closeModal(m.id));
});

/* ---------- 칸 정보 모달 ---------- */
let currentTile = null;
function openTileModal(i){
  currentTile = i;
  const t = TILES[i];
  const isDept = t.kind==="dept";
  $("tmHero").style.backgroundImage = `url('${t.img}')`;
  $("tmName").textContent = t.name;
  $("tmType").textContent = KIND_LABEL[t.kind];
  $("tmDesc").textContent = t.desc || "";

  /* 팀 구역 + 통행료 ×2 안내 */
  const zoneSec = $("tmZoneSec");
  if(isDept){
    const home = teamOf(t.home);
    const active = (workers[i]||[]).includes(t.home);
    zoneSec.style.display = "";
    zoneSec.style.setProperty("--tc", home.color);
    $("tmZoneTitle").textContent = `🏠 ${home.emoji} ${home.name} 구역`;
    $("tmZone").innerHTML =
      `이 칸은 <b>${home.name}</b> 구역입니다. ${home.name}이 일꾼을 세우면 통행료가 <b>2배</b>가 됩니다.` +
      (active ? `<br><span class="x2on">⚡ 지금 통행료 ×2 적용 중!</span>` : "");
  }else{
    zoneSec.style.display = "none";
  }

  const hasGame = !!t.game;
  $("tmGameSec").style.display = hasGame ? "" : "none";
  $("tmWinSec").style.display  = t.win ? "" : "none";
  if(hasGame) $("tmGame").textContent = t.game;
  if(t.win)   $("tmWin").textContent  = t.win;

  const list = workers[i] || [];
  if(isDept){
    $("tmWorkers").style.display = "";
    $("tmWorkers").innerHTML = TEAMS.map(tm=>{
      const n = list.filter(id=>id===tm.id).length;
      return n ? `<span class="wk" style="--tc:${tm.color}"><i>${tm.emoji}</i>${tm.name} ×${n}</span>` : "";
    }).join("") || `<span class="wk" style="--tc:#5a6f92">🙌 아직 세워진 일꾼이 없습니다</span>`;
  }else{
    $("tmWorkers").style.display = "none";
  }

  $("tmWorkerBtn").style.display = isDept ? "" : "none";
  $("tmGoldBtn").style.display = t.kind==="gold" ? "" : "none";
  openModal("tileModal");
}
$("tmWorkerBtn").addEventListener("click", ()=>{
  closeModal("tileModal");
  openWorkerModal(currentTile);
});
$("tmGoldBtn").addEventListener("click", ()=>{ location.href = GOLDEN_KEY_PAGE; });

/* ---------- 일꾼 팀 선택 모달 (부서 칸 16곳만) ---------- */
let workerTile = null;
function openWorkerModal(i){
  if(TILES[i].kind!=="dept"){
    showToast("🚫 이 칸에는 일꾼을 세울 수 없습니다.");
    return;
  }
  workerTile = i;
  $("wmTileName").textContent = `「${TILES[i].name}」 칸에 어느 팀 일꾼을 세울까요?`;
  renderWorkerGrid();
  openModal("workerModal");
}
function renderWorkerGrid(){
  const tile = TILES[workerTile];
  const list = workers[workerTile] || [];
  $("wmGrid").innerHTML = "";
  TEAMS.forEach(t=>{
    const n = list.filter(id=>id===t.id).length;
    const isHome = tile.home===t.id;
    const d = document.createElement("div");
    d.className = "wm-team" + (n ? " has" : "");
    d.style.setProperty("--tc", t.color);
    d.innerHTML = `
      <div class="face">${t.emoji}</div>
      <div>
        <div class="nm">${t.name}${isHome ? '<span class="home-tag">×2 구역</span>' : ""}</div>
        <div class="cnt">일꾼 ${n}명</div>
      </div>
      <button class="minus" title="일꾼 1명 제거">−</button>`;
    d.addEventListener("click", ()=>{
      (workers[workerTile] = workers[workerTile] || []).push(t.id);
      saveState(); renderWorkers(workerTile); renderWorkerGrid();
      showToast(isHome
        ? `⚡ ${t.emoji} ${t.name} 홈구역! 「${TILES[workerTile].name}」 통행료 ×2!`
        : `${t.emoji} ${t.name} 일꾼을 「${TILES[workerTile].name}」에 세웠습니다!`);
    });
    d.querySelector(".minus").addEventListener("click", e=>{
      e.stopPropagation();
      const arr = workers[workerTile] || [];
      const idx = arr.lastIndexOf(t.id);
      if(idx>-1){
        arr.splice(idx,1);
        saveState(); renderWorkers(workerTile); renderWorkerGrid();
        showToast(`${t.emoji} ${t.name} 일꾼 1명을 제거했습니다.`);
      }
    });
    $("wmGrid").appendChild(d);
  });
}

/* ---------- 게임 말 (동물 캐릭터, 마우스로 자유 이동) ---------- */
const pieceLayer = $("pieceLayer");
const DEFAULT_POS = { A:{x:5.5,y:87.5}, B:{x:10.5,y:87.5}, C:{x:5.5,y:93}, D:{x:10.5,y:93} };

function renderPieces(){
  pieceLayer.innerHTML = "";
  TEAMS.forEach(t=>{
    const pos = pieces[t.id] || DEFAULT_POS[t.id];
    const el = document.createElement("div");
    el.className = "piece";
    el.dataset.team = t.id;
    el.dataset.label = t.name.replace("팀","");
    el.style.setProperty("--tc", t.color);
    el.style.left = pos.x + "%";
    el.style.top  = pos.y + "%";
    el.textContent = t.emoji;
    el.title = t.name + " 말 (드래그해서 이동)";
    enableDrag(el);
    pieceLayer.appendChild(el);
  });
}
function enableDrag(el){
  el.addEventListener("pointerdown", e=>{
    e.preventDefault();
    el.setPointerCapture(e.pointerId);
    el.classList.add("drag");
    const move = ev=>{
      const r = boardEl.getBoundingClientRect();
      const x = Math.min(98, Math.max(2, (ev.clientX - r.left) / r.width  * 100));
      const y = Math.min(98, Math.max(2, (ev.clientY - r.top)  / r.height * 100));
      el.style.left = x + "%";
      el.style.top  = y + "%";
    };
    const up = ev=>{
      el.classList.remove("drag");
      el.removeEventListener("pointermove", move);
      el.removeEventListener("pointerup", up);
      el.removeEventListener("pointercancel", up);
      pieces[el.dataset.team] = { x:parseFloat(el.style.left), y:parseFloat(el.style.top) };
      saveState();
    };
    el.addEventListener("pointermove", move);
    el.addEventListener("pointerup", up);
    el.addEventListener("pointercancel", up);
  });
}

/* ---------- 주사위 사운드 (Web Audio) ---------- */
let audioCtx;
function actx(){ return audioCtx = audioCtx || new (window.AudioContext||window.webkitAudioContext)(); }
let _noiseBuf = null;
function diceTick(){
  /* 주사위가 컵/판에 부딪히는 '달그락' 소리 */
  try{
    const c = actx(), now = c.currentTime;
    if(!_noiseBuf){
      _noiseBuf = c.createBuffer(1, Math.floor(c.sampleRate*0.04), c.sampleRate);
      const d = _noiseBuf.getChannelData(0);
      for(let i=0;i<d.length;i++) d[i] = (Math.random()*2-1)*Math.pow(1-i/d.length,2);
    }
    const src = c.createBufferSource(); src.buffer = _noiseBuf;
    src.playbackRate.value = .8 + Math.random()*.7;
    const bp = c.createBiquadFilter(); bp.type = "bandpass";
    bp.frequency.value = 1500 + Math.random()*1600; bp.Q.value = 1.2;
    const g = c.createGain(); g.gain.value = .35 + Math.random()*.25;
    src.connect(bp).connect(g).connect(c.destination); src.start(now);
    /* 나무판 노크 저음 */
    const o = c.createOscillator(), og = c.createGain();
    o.type = "triangle";
    o.frequency.setValueAtTime(220 + Math.random()*140, now);
    o.frequency.exponentialRampToValueAtTime(90, now + .04);
    og.gain.setValueAtTime(.14, now);
    og.gain.exponentialRampToValueAtTime(.0001, now + .07);
    o.connect(og).connect(c.destination); o.start(now); o.stop(now + .08);
  }catch(e){}
}
function diceLand(isDouble){
  /* 멈출 때 '탁' + 더블이면 짧은 차임 */
  try{
    const c = actx(), now = c.currentTime;
    const o = c.createOscillator(), g = c.createGain();
    o.type = "square";
    o.frequency.setValueAtTime(300, now);
    o.frequency.exponentialRampToValueAtTime(70, now + .09);
    g.gain.setValueAtTime(.3, now);
    g.gain.exponentialRampToValueAtTime(.0001, now + .16);
    o.connect(g).connect(c.destination); o.start(now); o.stop(now + .17);
    if(isDouble){
      [659.25, 830.6, 987.77].forEach((f,i)=>{
        const oo = c.createOscillator(), gg = c.createGain();
        oo.type = "sine"; oo.frequency.value = f;
        gg.gain.setValueAtTime(0, now + .12 + i*.08);
        gg.gain.linearRampToValueAtTime(.09, now + .12 + i*.08 + .02);
        gg.gain.exponentialRampToValueAtTime(.0001, now + .12 + i*.08 + .5);
        oo.connect(gg).connect(c.destination);
        oo.start(now + .12 + i*.08); oo.stop(now + .12 + i*.08 + .5);
      });
    }
  }catch(e){}
}

/* ---------- 주사위 모달 ---------- */
/* 주사위 눈 배치 (3×3 그리드에서 켤 pip 위치) */
const PIP_MAP = {
  1:[4], 2:[0,8], 3:[0,4,8], 4:[0,2,6,8], 5:[0,2,4,6,8], 6:[0,2,3,5,6,8],
};
function buildDie(el){
  el.innerHTML = "";
  for(let i=0;i<9;i++){ const p=document.createElement("span"); p.className="pip"; el.appendChild(p); }
}
function showFace(el, n){
  const pips = el.querySelectorAll(".pip");
  pips.forEach((p,i)=>p.classList.toggle("on", PIP_MAP[n].includes(i)));
}
buildDie($("die1")); buildDie($("die2"));
showFace($("die1"), 3); showFace($("die2"), 5);

let rolling = false;
$("diceOpenBtn").addEventListener("click", ()=>openModal("diceModal"));
$("rollBtn").addEventListener("click", ()=>{
  if(rolling) return;
  rolling = true;
  /* 브라우저 정책상 사용자 제스처 안에서 오디오를 깨워야 소리가 납니다 */
  try{ const a = actx(); if(a.state==="suspended") a.resume(); }catch(e){}

  const d1=$("die1"), d2=$("die2"), res=$("diceResult"), btn=$("rollBtn");
  btn.disabled = true;
  d1.classList.add("rolling"); d2.classList.add("rolling");
  res.textContent = "데구르르...";

  const iv = setInterval(()=>{
    showFace(d1, 1+Math.floor(Math.random()*6));
    showFace(d2, 1+Math.floor(Math.random()*6));
    diceTick();
  }, 90);

  setTimeout(()=>{
    clearInterval(iv);
    const a = 1+Math.floor(Math.random()*6), b = 1+Math.floor(Math.random()*6);
    showFace(d1,a); showFace(d2,b);
    d1.classList.remove("rolling"); d2.classList.remove("rolling");
    diceLand(a===b);
    res.innerHTML = `${a} + ${b} = <span class="tot">${a+b}</span>칸 이동!` +
      (a===b ? ` <span class="dbl">🎉 더블! 한 번 더</span>` : "");
    rolling = false; btn.disabled = false;
  }, 900);
});

/* ---------- 황금열쇠 / 초기화 ---------- */
$("goldBtn").addEventListener("click", ()=>{ location.href = GOLDEN_KEY_PAGE; });
$("resetBtn").addEventListener("click", ()=>{
  if(!confirm("말 위치와 모든 일꾼을 초기화할까요?")) return;
  workers = {}; pieces = {};
  saveState(); renderAllWorkers(); renderPieces();
  showToast("↺ 보드를 초기화했습니다.");
});

/* ---------- 토스트 ---------- */
let toastTimer;
function showToast(msg){
  const t = $("toast"); t.textContent = msg; t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove("show"), 2200);
}

/* ---------- 시작 ---------- */
loadState();
renderAllWorkers();
renderPieces();
